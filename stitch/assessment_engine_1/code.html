<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Assessment Engine - Engaging Ed-Tech</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#fb6a51",
                        "background-light": "#f8f6f5",
                        "background-dark": "#23120f",
                        "accent-green": "#4CB944",
                        "text-slate": "#2D3142",
                        "muted-gray": "#9095A7",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "body": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                    boxShadow: {
                        'soft': '0 8px 24px rgba(45, 49, 66, 0.08)',
                        'hover': '0 12px 32px rgba(45, 49, 66, 0.12)',
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: theme('colors.background-light');
            color: theme('colors.text-slate');
        }
        
        /* Custom styles for Likert scale interactions */
        .likert-btn {
            transition: all 0.2s ease-in-out;
        }
        .likert-btn:hover {
            border-color: theme('colors.primary');
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(251, 106, 81, 0.15);
        }
        .likert-btn:hover span.emoji {
            transform: scale(1.1);
        }
        .likert-btn.active {
            background-color: theme('colors.primary');
            border-color: theme('colors.primary');
        }
        .likert-btn.active span.emoji {
            filter: grayscale(100%) brightness(200%); /* Make emoji white-ish on active */
        }
        
        span.emoji {
            transition: transform 0.2s ease-in-out;
            display: inline-block;
        }

        /* Progress Bar Animation Placeholder */
        .progress-striped {
            background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.15) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0.15) 75%, transparent 75%, transparent);
            background-size: 1rem 1rem;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start overflow-hidden">
<!-- Top Navbar (Shared Component customized for Focused View) -->
<div class="w-full bg-[#fcf9f8] border-b border-solid border-b-[#f4e8e6] sticky top-0 z-50">
<div class="max-w-[960px] mx-auto flex flex-col w-full">
<header class="flex items-center justify-between whitespace-nowrap px-6 md:px-10 py-4 h-[80px]">
<!-- Minimal Header / Back-to-Main Exception -->
<button aria-label="Go back" class="flex items-center gap-2 text-muted-gray hover:text-text-slate transition-colors">
<span class="material-symbols-outlined text-xl">arrow_back</span>
</button>
<!-- Progress Section in Header -->
<div class="flex-1 max-w-md mx-8 flex flex-col gap-1.5">
<div class="flex justify-between items-end px-1">
<p class="text-text-slate text-sm font-semibold tracking-wide uppercase text-[10px]">Module 1: Personality</p>
<p class="text-text-slate text-sm font-bold">45%</p>
</div>
<!-- Chunky Progress Bar -->
<div class="h-4 w-full bg-gray-200 rounded-full overflow-hidden">
<div class="h-full rounded-full bg-accent-green progress-striped transition-all duration-500 ease-out" style="width: 45%;"></div>
</div>
</div>
<!-- Pause & Save Button -->
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-10 px-5 bg-[#f4e8e6] hover:bg-[#e9d2ce] transition-colors text-text-slate text-sm font-bold leading-normal tracking-wide">
<span class="truncate">Pause &amp; Save</span>
</button>
</header>
</div>
</div>
<!-- Main Assessment Area -->
<main class="flex-1 flex flex-col items-center justify-center w-full px-4 py-12 relative">
<!-- Question Card -->
<!-- Fixed width 600px on desktop, full width minus padding on smaller screens -->
<div class="w-full max-w-[600px] bg-white rounded-[32px] shadow-soft p-10 md:p-14 flex flex-col items-center gap-12 relative z-10">
<!-- Question Text -->
<h2 class="text-text-slate text-[28px] md:text-[32px] font-bold leading-tight text-center">
                I find it easy to introduce myself to new people.
            </h2>
<!-- Likert Scale Container -->
<div class="w-full flex flex-col items-center gap-6">
<!-- Buttons Row -->
<div class="flex justify-between w-full max-w-[400px]">
<!-- Option 1: Strongly Disagree -->
<button aria-label="Strongly Disagree" class="likert-btn w-16 h-16 rounded-full border-2 border-muted-gray/30 flex items-center justify-center bg-white cursor-pointer focus:outline-none focus:ring-4 focus:ring-primary/20">
<span class="emoji text-3xl">😞</span>
</button>
<!-- Option 2: Disagree -->
<button aria-label="Disagree" class="likert-btn w-16 h-16 rounded-full border-2 border-muted-gray/30 flex items-center justify-center bg-white cursor-pointer focus:outline-none focus:ring-4 focus:ring-primary/20">
<span class="emoji text-3xl">🙁</span>
</button>
<!-- Option 3: Neutral -->
<button aria-label="Neutral" class="likert-btn w-16 h-16 rounded-full border-2 border-muted-gray/30 flex items-center justify-center bg-white cursor-pointer focus:outline-none focus:ring-4 focus:ring-primary/20">
<span class="emoji text-3xl">😐</span>
</button>
<!-- Option 4: Agree -->
<button aria-label="Agree" class="likert-btn w-16 h-16 rounded-full border-2 border-muted-gray/30 flex items-center justify-center bg-white cursor-pointer focus:outline-none focus:ring-4 focus:ring-primary/20">
<span class="emoji text-3xl">🙂</span>
</button>
<!-- Option 5: Strongly Agree -->
<button aria-label="Strongly Agree" class="likert-btn w-16 h-16 rounded-full border-2 border-muted-gray/30 flex items-center justify-center bg-white cursor-pointer focus:outline-none focus:ring-4 focus:ring-primary/20">
<span class="emoji text-3xl">🤩</span>
</button>
</div>
<!-- Labels -->
<div class="flex justify-between w-full max-w-[400px] px-2 text-muted-gray text-xs font-medium uppercase tracking-wider">
<span>Disagree</span>
<span>Agree</span>
</div>
</div>
</div>
</main>
</body></html>
