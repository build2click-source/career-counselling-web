<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pause &amp; Save</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#fb6a51",
          "background-light": "#f8f6f5",
          "background-dark": "#23120f",
        },
        fontFamily: {
          "display": ["Manrope"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
  body {
    font-family: 'Manrope', sans-serif;
  }
</style>
</head>
<body class="bg-background-light h-screen w-full relative overflow-hidden flex items-center justify-center">
<!-- Background Assessment Interface (Blurred) -->
<div class="absolute inset-0 flex flex-col pointer-events-none">
<!-- Header Area -->
<header class="flex items-center justify-between px-6 py-4 bg-white shadow-sm h-20">
<div class="flex items-center gap-4 w-1/3">
<span class="text-sm font-semibold text-gray-500">Module 3/5</span>
</div>
<!-- Progress Bar -->
<div class="w-1/3 h-4 bg-gray-100 rounded-full overflow-hidden">
<div class="h-full bg-green-500 w-[60%] rounded-full"></div>
</div>
<div class="w-1/3 flex justify-end">
<button class="text-gray-500 font-semibold px-4 py-2 opacity-50">Pause &amp; Save</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center p-6">
<div class="w-full max-w-[600px] bg-white rounded-[24px] shadow-sm p-10 flex flex-col items-center justify-center text-center opacity-50">
<h2 class="text-[28px] font-bold text-gray-800 mb-12">I prefer working on complex problems rather than simple ones.</h2>
<!-- Likert Scale -->
<div class="flex justify-between w-full max-w-md gap-4">
<div class="w-16 h-16 rounded-full border-2 border-gray-200 flex items-center justify-center text-3xl text-gray-400">😞</div>
<div class="w-16 h-16 rounded-full border-2 border-gray-200 flex items-center justify-center text-3xl text-gray-400">🙁</div>
<div class="w-16 h-16 rounded-full border-2 border-gray-200 flex items-center justify-center text-3xl text-gray-400">😐</div>
<div class="w-16 h-16 rounded-full border-2 border-gray-200 flex items-center justify-center text-3xl text-gray-400">🙂</div>
<div class="w-16 h-16 rounded-full border-2 border-gray-200 flex items-center justify-center text-3xl text-gray-400">🤩</div>
</div>
</div>
</main>
</div>
<!-- Modal Backdrop Overlay -->
<div class="absolute inset-0 bg-[#2D3142]/60 backdrop-blur-[4px] z-40 flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="bg-white w-full max-w-[400px] rounded-[24px] p-8 shadow-[0_8px_24px_rgba(45,49,66,0.08)] flex flex-col items-center text-center relative transform transition-all scale-100 opacity-100 z-50">
<!-- Illustration / Emoji -->
<div class="text-[72px] leading-none mb-6">
        🏕️
      </div>
<!-- Content -->
<h2 class="text-[#1c0f0d] text-[28px] font-bold leading-tight mb-3">Taking a quick break?</h2>
<p class="text-gray-600 text-base font-normal leading-relaxed mb-8 px-2">
        Your progress is safely saved. Take your time to rest and return when you're ready.
      </p>
<!-- Primary Action -->
<button class="w-full h-14 bg-primary text-white font-bold text-lg rounded-full flex items-center justify-center transition-transform hover:scale-[0.98] active:scale-95 mb-4 shadow-sm group">
<!-- Default State -->
<span class="block">Save &amp; Exit to Dashboard</span>
<!-- Saving State (Hidden by default, shown for demonstration logic concept if active) -->
<!-- 
        <span class="hidden items-center justify-center gap-2">
          <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Saving...
        </span> 
        -->
</button>
<!-- Secondary Action -->
<button class="text-gray-500 font-semibold text-base hover:text-gray-800 transition-colors px-4 py-2 rounded-lg">
        Keep Going
      </button>
</div>
</div>
</body></html>
